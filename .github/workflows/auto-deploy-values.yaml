replicaCount: 1

image:
  repository: $repository
  tag: "$tag"
  pullPolicy: Always
  secrets: []

extraLabels:
  "ID": "$service_id"

gitlab:
  app: "$app_name"
  envURL: "$repo_url"

service:
  enabled: true
  name: "web"
  url: "$public_url"
  type: ClusterIP
  externalPort: 80   # must match your app port
  internalPort: 80

ingress:
  enabled: true
  path: "/"
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: acdh-prod

# --- STARTUP PROBE ---
startupProbe:
  enabled: true
  probeType: "httpGet"
  path: /api.php?action=query&meta=siteinfo&format=json
  port: 80
  failureThreshold: 60
  periodSeconds: 10
  timeoutSeconds: 5
  initialDelaySeconds: 30

# --- LIVENESS PROBE ---
livenessProbe:
  enabled: true
  probeType: "tcpSocket"
  port: 80
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 5
  initialDelaySeconds: 60

# --- READINESS PROBE ---
readinessProbe:
  enabled: true
  probeType: "httpGet"
  path: /api.php?action=query&meta=siteinfo&format=json
  port: 80
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  initialDelaySeconds: 60